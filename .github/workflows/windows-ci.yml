name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out source without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check --prefer-binary -r requirements.txt
          python -m pip check

      - name: Run Python tests and syntax checks
        shell: pwsh
        run: |
          python -m py_compile mowik.py mowik_audio_devices.py mowik_i18n.py mowik_commands.py mowik_windows_actions.py
          python -m unittest discover -s tests -v

      - name: Parse PowerShell and verify release version metadata
        shell: pwsh
        run: |
          $parseErrors = @()
          foreach ($path in @(
            Get-ChildItem -LiteralPath scripts -Filter '*.ps1' -File
            Get-Item -LiteralPath scripts/WindowsReleaseTools.psm1
            Get-ChildItem -LiteralPath . -Filter '*.ps1' -File
          )) {
            $tokens = $null
            $errors = $null
            [void][Management.Automation.Language.Parser]::ParseFile(
              $path.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            $parseErrors += @($errors)
          }
          if ($parseErrors.Count -gt 0) {
            $parseErrors | Format-List | Out-String | Write-Error
            throw 'PowerShell parser errors were found.'
          }
          ./scripts/test-release-version.ps1 -Version 2.7.3

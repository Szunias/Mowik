name: Windows installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.authorize.outputs.release_version }}
      tag_commit: ${{ steps.authorize.outputs.tag_commit }}
      installer_sha256: ${{ steps.capture_payload.outputs.installer_sha256 }}
      checksum_sha256: ${{ steps.capture_payload.outputs.checksum_sha256 }}
    env:
      PYTHONUTF8: "1"
      MOWIK_INNO_SETUP_VERSION: "6.7.1"
      MOWIK_INNO_SETUP_SHA256: "4D11E8050B6185E0D49BD9E8CC661A7A59F44959A621D31D11033124C4E8A7B0"
      MOWIK_INNO_SETUP_URL: "https://github.com/jrsoftware/issrc/releases/download/is-6_7_1/innosetup-6.7.1.exe"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Authorize immutable release tag
        id: authorize
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -ne 'tag') {
            throw (
              'Publishing is allowed only when the workflow ref is an existing tag. ' +
              'For workflow_dispatch, select the vMAJOR.MINOR.PATCH tag in the ref picker.'
            )
          }

          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw 'The release tag must have the exact form vMAJOR.MINOR.PATCH.'
          }
          $version = $Matches.version

          $headCommit = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not resolve the checked-out commit.'
          }
          $tagCommit = (git rev-parse "$tag^{commit}").Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "Could not peel release tag $tag to a commit."
          }
          $eventCommit = (git rev-parse "$env:GITHUB_SHA^{commit}").Trim()
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not peel GITHUB_SHA to a commit.'
          }
          if (($tagCommit -ine $headCommit) -or ($tagCommit -ine $eventCommit)) {
            throw (
              "Release tag $tag, checked-out HEAD and GITHUB_SHA do not resolve " +
              'to the same commit.'
            )
          }

          $remoteLines = @(git ls-remote origin "refs/tags/$tag" "refs/tags/$tag^{}")
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify release tag $tag against origin."
          }
          $remoteRefs = @{}
          foreach ($line in $remoteLines) {
            $parts = $line -split '\s+', 2
            if ($parts.Count -eq 2) {
              $remoteRefs[$parts[1]] = $parts[0]
            }
          }
          $tagRef = "refs/tags/$tag"
          $peeledTagRef = "$tagRef^{}"
          $remoteCommit = if ($remoteRefs.ContainsKey($peeledTagRef)) {
            $remoteRefs[$peeledTagRef]
          } elseif ($remoteRefs.ContainsKey($tagRef)) {
            $remoteRefs[$tagRef]
          } else {
            throw "Release tag $tag does not exist on origin."
          }
          if ($remoteCommit -ine $headCommit) {
            throw "Release tag $tag on origin does not point to the checked-out commit."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MOWIK_RELEASE_TAG_COMMIT=$headCommit" |
            Out-File -FilePath $env:GITHUB_ENV -Append
          "release_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag_commit=$headCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify release version consistency
        shell: pwsh
        run: ./scripts/test-release-version.ps1 -Version $env:RELEASE_VERSION

      - name: Prepare build environment
        shell: pwsh
        run: |
          python -m venv .venv

          $innoInstaller = Join-Path `
            $env:RUNNER_TEMP `
            "innosetup-$env:MOWIK_INNO_SETUP_VERSION.exe"
          if (Test-Path -LiteralPath $innoInstaller) {
            throw 'Refusing to replace an existing temporary Inno Setup installer.'
          }
          try {
            Invoke-WebRequest `
              -Uri $env:MOWIK_INNO_SETUP_URL `
              -OutFile $innoInstaller
            $downloadHash = (
              Get-FileHash -LiteralPath $innoInstaller -Algorithm SHA256
            ).Hash.ToUpperInvariant()
            if ($downloadHash -cne $env:MOWIK_INNO_SETUP_SHA256) {
              throw 'The Inno Setup installer SHA-256 does not match the pinned release asset.'
            }

            $downloadSignature = Get-AuthenticodeSignature -LiteralPath $innoInstaller
            if ($downloadSignature.Status -ne
                  [Management.Automation.SignatureStatus]::Valid -or
                $null -eq $downloadSignature.SignerCertificate -or
                $downloadSignature.SignerCertificate.Subject -notmatch
                  '(?:^|,\s*)O=Pyrsys B\.V\.(?:,|$)') {
              throw 'The pinned Inno Setup installer is not validly signed by Pyrsys B.V.'
            }

            $innoInstall = Start-Process `
              -FilePath $innoInstaller `
              -ArgumentList @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-') `
              -Wait `
              -PassThru
            if ($innoInstall.ExitCode -ne 0) {
              throw "Installing pinned Inno Setup failed with code $($innoInstall.ExitCode)."
            }
          }
          finally {
            if (Test-Path -LiteralPath $innoInstaller) {
              Remove-Item -LiteralPath $innoInstaller -Force
            }
          }

          Import-Module ./scripts/WindowsReleaseTools.psm1 -Force -DisableNameChecking
          if (-not ${env:ProgramFiles(x86)}) {
            throw 'The expected 64-bit Windows Program Files path is unavailable.'
          }
          $expectedInnoCompiler = Join-Path `
            ${env:ProgramFiles(x86)} `
            'Inno Setup 6\ISCC.exe'
          $innoCompiler = Resolve-InnoCompiler `
            -InnoCompilerPath $expectedInnoCompiler
          if ([string]::IsNullOrWhiteSpace($innoCompiler)) {
            throw 'The pinned Inno Setup compiler was not found after installation.'
          }
          "MOWIK_INNO_COMPILER_PATH=$innoCompiler" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build and verify explicitly unsigned release installer
        shell: pwsh
        run: |
          ./scripts/build-release.ps1 `
            -Version $env:RELEASE_VERSION `
            -BuildMode UnsignedRelease `
            -InnoCompilerPath $env:MOWIK_INNO_COMPILER_PATH `
            -SkipToolInstall

      - name: Test English and Polish installation and uninstall
        shell: pwsh
        run: |
          ./scripts/test-installer.ps1 `
            -Version $env:RELEASE_VERSION `
            -InstallerFileName "Mowik-$env:RELEASE_VERSION-Setup-UNSIGNED.exe"

      - name: Re-verify immutable unsigned release payload
        shell: pwsh
        run: |
          ./scripts/test-release-artifacts.ps1 `
            -Version $env:RELEASE_VERSION `
            -InstallerFileName "Mowik-$env:RELEASE_VERSION-Setup-UNSIGNED.exe"

      - name: Capture verified payload identity
        id: capture_payload
        shell: pwsh
        run: |
          $installer = "release/Mowik-$env:RELEASE_VERSION-Setup-UNSIGNED.exe"
          $checksum = 'release/SHA256SUMS.txt'
          $installerHash = (
            Get-FileHash -LiteralPath $installer -Algorithm SHA256
          ).Hash.ToUpperInvariant()
          $checksumHash = (
            Get-FileHash -LiteralPath $checksum -Algorithm SHA256
          ).Hash.ToUpperInvariant()
          "installer_sha256=$installerHash" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "checksum_sha256=$checksumHash" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload verified unsigned build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Mowik-${{ env.RELEASE_VERSION }}-Windows-UNSIGNED
          path: |
            release/Mowik-${{ env.RELEASE_VERSION }}-Setup-UNSIGNED.exe
            release/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0

  publish-release:
    needs: build-installer
    if: github.ref_type == 'tag'
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      PYTHONUTF8: "1"
      RELEASE_VERSION: ${{ needs.build-installer.outputs.release_version }}
      MOWIK_RELEASE_TAG_COMMIT: ${{ needs.build-installer.outputs.tag_commit }}
      MOWIK_EXPECTED_INSTALLER_SHA256: ${{ needs.build-installer.outputs.installer_sha256 }}
      MOWIK_EXPECTED_CHECKSUM_SHA256: ${{ needs.build-installer.outputs.checksum_sha256 }}

    steps:
      - name: Check out authorized release source without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Re-authorize immutable release tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($env:GITHUB_REF_TYPE -ne 'tag' -or
              $tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw 'Publishing requires an exact vMAJOR.MINOR.PATCH tag ref.'
          }
          if ($Matches.version -cne $env:RELEASE_VERSION) {
            throw 'The publishing job received a version inconsistent with its tag.'
          }

          $headCommit = (git rev-parse HEAD).Trim()
          $eventCommit = (git rev-parse "$env:GITHUB_SHA^{commit}").Trim()
          if (($LASTEXITCODE -ne 0) -or
              ($headCommit -ine $env:MOWIK_RELEASE_TAG_COMMIT) -or
              ($eventCommit -ine $env:MOWIK_RELEASE_TAG_COMMIT)) {
            throw 'The publishing checkout is not the commit authorized by the build job.'
          }

          $remoteLines = @(git ls-remote origin "refs/tags/$tag" "refs/tags/$tag^{}")
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify release tag $tag against origin."
          }
          $remoteRefs = @{}
          foreach ($line in $remoteLines) {
            $parts = $line -split '\s+', 2
            if ($parts.Count -eq 2) {
              $remoteRefs[$parts[1]] = $parts[0]
            }
          }
          $tagRef = "refs/tags/$tag"
          $peeledTagRef = "$tagRef^{}"
          $remoteCommit = if ($remoteRefs.ContainsKey($peeledTagRef)) {
            $remoteRefs[$peeledTagRef]
          } elseif ($remoteRefs.ContainsKey($tagRef)) {
            $remoteRefs[$tagRef]
          } else {
            throw "Release tag $tag no longer exists on origin."
          }
          if ($remoteCommit -ine $env:MOWIK_RELEASE_TAG_COMMIT) {
            throw "Release tag $tag moved after the artifact was built."
          }

          ./scripts/test-release-version.ps1 -Version $env:RELEASE_VERSION

      - name: Download unsigned artifact from the isolated build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Mowik-${{ env.RELEASE_VERSION }}-Windows-UNSIGNED
          path: release

      - name: Verify downloaded unsigned release payload
        shell: pwsh
        run: |
          $installer = "release/Mowik-$env:RELEASE_VERSION-Setup-UNSIGNED.exe"
          $signature = Get-AuthenticodeSignature -LiteralPath $installer
          if ($signature.Status -ne [Management.Automation.SignatureStatus]::NotSigned) {
            throw "The downloaded unsigned installer has unexpected signature status $($signature.Status)."
          }
          $installerHash = (
            Get-FileHash -LiteralPath $installer -Algorithm SHA256
          ).Hash.ToUpperInvariant()
          $checksumHash = (
            Get-FileHash -LiteralPath 'release/SHA256SUMS.txt' -Algorithm SHA256
          ).Hash.ToUpperInvariant()
          if (($installerHash -ine $env:MOWIK_EXPECTED_INSTALLER_SHA256) -or
              ($checksumHash -ine $env:MOWIK_EXPECTED_CHECKSUM_SHA256)) {
            throw 'The downloaded release payload differs from the verified build output.'
          }
          ./scripts/test-release-artifacts.ps1 `
            -Version $env:RELEASE_VERSION `
            -InstallerFileName "Mowik-$env:RELEASE_VERSION-Setup-UNSIGNED.exe"

      - name: Publish verified immutable GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $installer = "release/Mowik-$env:RELEASE_VERSION-Setup-UNSIGNED.exe"
          $checksum = 'release/SHA256SUMS.txt'
          ./scripts/test-release-artifacts.ps1 `
            -Version $env:RELEASE_VERSION `
            -InstallerFileName "Mowik-$env:RELEASE_VERSION-Setup-UNSIGNED.exe"

          function Get-RemoteTagCommit {
            param([Parameter(Mandatory)] [string]$Tag)

            $remoteLines = @(git ls-remote origin "refs/tags/$Tag" "refs/tags/$Tag^{}")
            if ($LASTEXITCODE -ne 0) {
              throw "Could not verify release tag $Tag against origin."
            }
            $remoteRefs = @{}
            foreach ($line in $remoteLines) {
              $parts = $line -split '\s+', 2
              if ($parts.Count -eq 2) {
                $remoteRefs[$parts[1]] = $parts[0]
              }
            }
            $tagRef = "refs/tags/$Tag"
            $peeledTagRef = "$tagRef^{}"
            if ($remoteRefs.ContainsKey($peeledTagRef)) {
              return $remoteRefs[$peeledTagRef]
            }
            if ($remoteRefs.ContainsKey($tagRef)) {
              return $remoteRefs[$tagRef]
            }
            throw "Release tag $Tag no longer exists on origin."
          }

          $remoteCommit = Get-RemoteTagCommit -Tag $tag
          if ($remoteCommit -ine $env:MOWIK_RELEASE_TAG_COMMIT) {
            throw "Release tag $tag moved while the release was being built."
          }

          $null = gh release view $tag --json id 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw (
              "Release $tag already exists. Refusing to mutate or clobber published assets; " +
              'use a new version/tag.'
            )
          }

          $releaseWarning = @'
          > [!WARNING]
          > This Windows installer is **not digitally signed**. Windows may display
          > **Unknown publisher** or a Microsoft Defender SmartScreen warning.
          >
          > Before running it, verify the installer's SHA-256 hash against the included
          > `SHA256SUMS.txt` file.
          '@

          gh release create $tag `
            --draft `
            --verify-tag `
            --title "Mówik $env:RELEASE_VERSION (unsigned Windows build)" `
            --notes $releaseWarning `
            --generate-notes
          if ($LASTEXITCODE -ne 0) {
            throw "Creating draft GitHub Release $tag failed."
          }

          # Upload without replacement. If this or verification fails, retain
          # the draft for manual inspection; never delete a draft here.
          gh release upload $tag $installer $checksum
          if ($LASTEXITCODE -ne 0) {
            throw "Uploading assets to draft GitHub Release $tag failed."
          }

          function Assert-ExactReleaseAssets {
            param([Parameter(Mandatory)] $Release)

            $expectedFiles = @(
              Get-Item -LiteralPath $installer,
              Get-Item -LiteralPath $checksum
            )
            $expectedNames = @($expectedFiles | ForEach-Object { $_.Name } | Sort-Object)
            $actualAssets = @($Release.assets)
            $actualNames = @($actualAssets | ForEach-Object { $_.name } | Sort-Object)
            if (($actualNames.Count -ne $expectedNames.Count) -or
                (($actualNames -join "`n") -cne ($expectedNames -join "`n"))) {
              throw (
                "Release $tag has an unexpected asset set. Expected: " +
                ($expectedNames -join ', ') + '; found: ' + ($actualNames -join ', ')
              )
            }
            foreach ($file in $expectedFiles) {
              $asset = @($actualAssets | Where-Object { $_.name -ceq $file.Name })
              $expectedDigest = 'sha256:' + (
                Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256
              ).Hash.ToLowerInvariant()
              if (($asset.Count -ne 1) -or
                  ([int64]$asset[0].size -ne $file.Length) -or
                  ($asset[0].state -cne 'uploaded') -or
                  ($asset[0].digest -cne $expectedDigest)) {
                throw (
                  "Release asset $($file.Name) has an unexpected size, digest, " +
                  'state or duplicate entry.'
                )
              }
            }
          }

          $draft = gh release view $tag --json tagName,isDraft,assets | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "Reading draft GitHub Release $tag failed."
          }
          if (($draft.tagName -cne $tag) -or (-not $draft.isDraft)) {
            throw "Release $tag is not the expected draft."
          }
          Assert-ExactReleaseAssets -Release $draft

          $remoteCommit = Get-RemoteTagCommit -Tag $tag
          if ($remoteCommit -ine $env:MOWIK_RELEASE_TAG_COMMIT) {
            throw "Release tag $tag moved while draft assets were being uploaded."
          }

          gh release edit $tag --draft=false
          if ($LASTEXITCODE -ne 0) {
            throw "Publishing verified GitHub Release $tag failed."
          }

          $published = gh release view $tag --json tagName,isDraft,assets | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "Reading published GitHub Release $tag failed."
          }
          if (($published.tagName -cne $tag) -or $published.isDraft) {
            throw "Release $tag was not published as expected."
          }
          Assert-ExactReleaseAssets -Release $published
